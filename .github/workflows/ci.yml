# Atomix CI — cross-platform build, test, and lint
#
# Runs on Linux (ubuntu), macOS, and Windows.
# See: §6.4 acceptance conditions

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (rustfmt)
        run: cargo fmt --all --check
        if: matrix.os == 'ubuntu-latest'

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build all targets
        run: cargo build --all-targets

      - name: Run all tests
        run: cargo test --all-targets

      - name: Build documentation
        run: cargo doc --no-deps
        if: matrix.os == 'ubuntu-latest'

  # Verify the CLI end-to-end pipeline works
  integration-test:
    name: CLI Integration Test
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      - name: Init a new project
        run: cargo run -- init /tmp/test-project

      - name: Check the project
        run: cargo run -- check /tmp/test-project/src/main.atx

      - name: Build the project
        run: cargo run -- build /tmp/test-project/src/main.atx --output /tmp/test-output

      - name: Verify output
        run: |
          test -f /tmp/test-output/main.atxe && echo "BUILD OK: main.atxe exists"
          file /tmp/test-output/main.atxe

  # Acceptance gate: verify §6.4 conditions
  acceptance-gate:
    name: Acceptance Gate (§6.4)
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Verify zero warnings
        run: |
          cargo clippy --all-targets 2>&1 | tee clippy_output.txt
          if grep -q "warning:" clippy_output.txt; then
            echo "❌ Clippy warnings found"
            exit 1
          fi
          echo "✅ Zero clippy warnings"

      - name: Verify all tests pass
        run: |
          cargo test --all-targets 2>&1 | tee test_output.txt
          if grep -q "FAILED" test_output.txt; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All tests pass"

      - name: Verify CLI commands
        run: |
          cargo run -- --help
          echo "✅ CLI works"
