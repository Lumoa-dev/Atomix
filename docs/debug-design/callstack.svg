<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Consolas, 'Courier New', monospace" font-size="12">
  <defs>
    <style>
      text { fill: #c0c0c0; }
      .green { fill: #4ec94e; } .red { fill: #e05555; }
      .dim { fill: #6a6a6a; } .white { fill: #e8e8e8; }
      .cyan { fill: #4ec9b0; } .orange { fill: #ce9178; }
      .blue { fill: #569cd6; } .purple { fill: #c586c0; }
      .bold { font-weight: bold; } .bg { fill: #1e1e1e; }
      .bg-header { fill: #2d2d30; } .bg-cmd { fill: #1a1a1a; }
      .bg-border { fill: #3e3e42; }
    </style>
  </defs>

  <rect width="1100" height="620" class="bg"/>
  <rect x="0" y="0" width="1100" height="22" class="bg-header"/>
  <text x="12" y="15" class="dim">atomix debug — demo.atx</text>

  <rect x="0" y="22" width="1100" height="22" class="bg-header"/>
  <text x="10" y="37" class="blue">Home</text>
  <text x="48" y="37" class="dim">▸</text>
  <text x="60" y="37" class="cyan bold">Call Stack</text>
  <text x="200" y="37" class="dim">│ 5 frames  │  Task: demo</text>

  <rect x="0" y="44" width="770" height="536" fill="#1e1e1e"/>

  <!-- Frame 0 (current) -->
  <rect x="10" y="55" width="750" height="65" fill="#264f78" stroke="#3e3e42" stroke-width="1" rx="4"/>
  <text x="24" y="78" class="green bold">→ Frame 0</text>
  <text x="120" y="78" class="white bold">TOOLS::transform()</text>
  <text x="280" y="78" class="dim">PC: 0x0064</text>
  <text x="400" y="78" class="dim">line 82</text>
  <text x="24" y="100" class="dim">Args:</text>
  <text x="70" y="100" class="white">data: dict</text>
  <text x="24" y="118" class="dim">Vars:</text>
  <text x="70" y="118" class="white">result={ok,count:42}</text>

  <!-- Frame 1 -->
  <rect x="10" y="130" width="750" height="50" fill="#252526" stroke="#3e3e42" stroke-width="1" rx="4"/>
  <text x="24" y="152" class="white bold">Frame 1</text>
  <text x="100" y="152" class="white">TASK:demo / STEP 3: transform(data)</text>
  <text x="420" y="152" class="dim">PC: 0x0050</text>
  <text x="24" y="174" class="dim">CALL transform(RAW) @ line 50</text>

  <!-- Frame 2 -->
  <rect x="10" y="188" width="750" height="50" fill="#252526" stroke="#3e3e42" stroke-width="1" rx="4"/>
  <text x="24" y="210" class="white bold">Frame 2</text>
  <text x="100" y="210" class="white">TASK:demo / STEP 2: validate(RAW)</text>
  <text x="420" y="210" class="dim">PC: 0x0043</text>
  <text x="24" y="232" class="dim">CALL validate(RAW) @ line 43</text>

  <!-- Frame 3 -->
  <rect x="10" y="246" width="750" height="50" fill="#252526" stroke="#3e3e42" stroke-width="1" rx="4"/>
  <text x="24" y="268" class="white bold">Frame 3</text>
  <text x="100" y="268" class="white">TASK:demo / STEP 1: fetch_data()</text>
  <text x="420" y="268" class="dim">PC: 0x0038</text>
  <text x="24" y="290" class="dim">CALL fetch_data() @ line 41</text>

  <!-- Frame 4 (root) -->
  <rect x="10" y="304" width="750" height="50" fill="#252526" stroke="#3e3e42" stroke-width="1" rx="4"/>
  <text x="24" y="326" class="white bold">Frame 4</text>
  <text x="100" y="326" class="white">TASK:demo (root / entry)</text>
  <text x="420" y="326" class="dim">PC: 0x002C</text>
  <text x="24" y="348" class="dim">— end of call stack —</text>

  <rect x="10" y="370" width="750" height="1" class="bg-border"/>

  <!-- Frame detail (selected frame 0) -->
  <rect x="10" y="385" width="750" height="120" fill="#1a1a1a" stroke="#3e3e42" stroke-width="1" rx="4"/>
  <text x="24" y="407" class="bold white">Frame 0 Detail</text>
  <text x="24" y="430" class="dim">Function:</text>
  <text x="100" y="430" class="white">TOOLS::transform()</text>
  <text x="24" y="450" class="dim">PC:</text>
  <text x="55" y="450" class="white">0x0064</text>
  <text x="140" y="450" class="dim">Source:</text>
  <text x="200" y="450" class="white">demo.atx line 82</text>
  <text x="24" y="470" class="dim">Registers:</text>
  <text x="110" y="470" class="white">a0(data)=0x7F00..., a1=0, t0(valid)=1, t1(result)=0x7F00...</text>
  <text x="24" y="490" class="dim">Stack:</text>
  <text x="75" y="490" class="white">sp=0x7F0000001000, fp=0x7F0000000FF0</text>

  <!-- Right panel -->
  <rect x="770" y="44" width="2" height="536" class="bg-border"/>
  <rect x="780" y="48" width="310" height="22" class="bg-header"/>
  <text x="790" y="63" class="bold white">Frame Detail</text>

  <rect x="780" y="76" width="310" height="80" fill="#264f78" rx="4"/>
  <text x="795" y="96" class="green bold">Frame 0: transform()</text>
  <rect x="790" y="104" width="290" height="1" fill="#3e3e42"/>
  <text x="795" y="122" class="dim">Zone:</text>
  <text x="835" y="122" class="white">TOOLS</text>
  <text x="795" y="140" class="dim">PC:</text>
  <text x="825" y="140" class="white">0x0064</text>
  <text x="795" y="158" class="dim">Line:</text>
  <text x="835" y="158" class="white">82</text>

  <rect x="780" y="168" width="310" height="1" class="bg-border"/>
  <text x="795" y="190" class="dim">↑↓ select frame</text>
  <text x="795" y="210" class="dim">Enter inspect frame</text>
  <text x="795" y="230" class="dim">u / d up/down frame</text>

  <rect x="0" y="593" width="1100" height="27" class="bg-cmd"/>
  <rect x="0" y="591" width="1100" height="2" class="bg-border"/>
  <text x="15" y="611" class="green bold">&gt;</text>
  <text x="30" y="611" class="white">frame 2</text>
  <text x="100" y="611" class="dim">│ exit │ ↑↓ select │ u/d │ Enter inspect</text>

</svg>