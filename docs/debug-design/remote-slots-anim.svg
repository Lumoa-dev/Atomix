<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Consolas, 'Courier New', monospace" font-size="12">
  <defs>
    <style>
      text { fill: #c0c0c0; }
      .green { fill: #4ec94e; } .red { fill: #e05555; } .yellow { fill: #d4b83b; }
      .dim { fill: #6a6a6a; } .white { fill: #e8e8e8; } .cyan { fill: #4ec9b0; }
      .orange { fill: #ce9178; } .blue { fill: #569cd6; } .purple { fill: #c586c0; }
      .bold { font-weight: bold; }
      .bg { fill: #1e1e1e; } .bg-header { fill: #2d2d30; } .bg-cmd { fill: #1a1a1a; }
      .bg-border { fill: #3e3e42; } .bg-card { fill: #252526; rx: 4; }
      .slot-free { fill: #2d2d30; stroke: #3e3e42; stroke-width: 1; }
      .slot-normal { fill: #264f78; stroke: #569cd6; stroke-width: 1; }
      .slot-slipway { fill: #4a3b1a; stroke: #d4b83b; stroke-width: 1; }
      .slot-dead { fill: #3a1a1a; stroke: #e05555; stroke-width: 1; }
      .slot-active { fill: #1a4a2a; stroke: #4ec94e; stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" class="bg"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="22" class="bg-header"/>
  <text x="12" y="15" class="dim">atomix debug — prod-runner @ 192.168.1.100:9000</text>

  <!-- Breadcrumb -->
  <rect x="0" y="22" width="1100" height="22" class="bg-header"/>
  <text x="10" y="37" class="dim">Dashboard ▸ :slots ▸</text>
  <text x="160" y="37" class="cyan bold">:slots-anim</text>

  <rect x="0" y="44" width="770" height="1" class="bg-border"/>

  <!-- LEFT PANEL: Slot grid animation -->

  <!-- Title + playback controls -->
  <text x="15" y="72" class="bold white">Memory Slot Animation — Live</text>
  <rect x="380" y="56" width="180" height="22" rx="3" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="395" y="72" class="yellow">▶ PLAYING</text>
  <text x="480" y="72" class="dim">1.0x</text>

  <rect x="570" y="56" width="180" height="22" rx="3" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="585" y="72" class="dim">⏸ Space pause</text>
  <text x="690" y="72" class="dim">← → speed</text>

  <!-- Slot grid -->
  <rect x="10" y="82" width="750" height="420" class="bg-panel" rx="3" stroke="#3e3e42" stroke-width="1"/>

  <!-- Column headers -->
  <text x="20" y="104" class="dim">Slot</text>
  <text x="80" y="104" class="dim">Type</text>
  <text x="160" y="104" class="dim">Task</text>
  <text x="360" y="104" class="dim">Allocation</text>
  <text x="520" y="104" class="dim">Status</text>

  <rect x="10" y="109" width="750" height="1" class="bg-border"/>

  <!-- Row 0: active allocation ❖ -->
  <rect x="10" y="112" width="750" height="38" class="slot-active" rx="1"/>
  <rect x="10" y="112" width="750" height="38" fill="#1a4a2a" opacity="0.3" rx="1"/>

  <!-- Slot column: visual block -->
  <rect x="20" y="122" width="30" height="18" class="slot-active"/>
  <text x="28" y="135" class="green bold">0</text>

  <text x="80" y="135" class="green">NORMAL</text>
  <text x="160" y="135" class="white">batch-7 / step 3</text>
  <text x="360" y="135" class="white">0x1000 – 0x10FF</text>
  <text x="520" y="135" class="green bold">● ACTIVE</text>

  <!-- Arrow animation hint -->
  <text x="640" y="135" class="yellow">◄── incoming</text>

  <!-- Row 1: normal -->
  <rect x="10" y="152" width="750" height="34" class="slot-normal" rx="1"/>
  <rect x="20" y="162" width="30" height="18" class="slot-normal"/>
  <text x="28" y="175" class="blue bold">1</text>

  <text x="80" y="173" class="blue">NORMAL</text>
  <text x="160" y="173" class="white">batch-6 / step 2</text>
  <text x="360" y="173" class="white">0x1100 – 0x11FF</text>
  <text x="520" y="173" class="cyan">● RUNNING</text>

  <!-- Row 2: slipway -->
  <rect x="10" y="188" width="750" height="34" class="slot-slipway" rx="1"/>
  <rect x="20" y="198" width="30" height="18" class="slot-slipway"/>
  <text x="28" y="211" class="yellow bold">2</text>

  <text x="80" y="209" class="yellow">SLIPWAY</text>
  <text x="160" y="209" class="white">batch-5 / step 1</text>
  <text x="360" y="209" class="white">0x1200 – 0x12FF</text>
  <text x="520" y="209" class="orange">● EVICTING</text>

  <!-- Row 3: slipway merging -->
  <rect x="10" y="224" width="750" height="34" class="slot-slipway" rx="1"/>
  <rect x="20" y="234" width="30" height="18" class="slot-slipway"/>
  <text x="28" y="247" class="yellow bold">3</text>

  <text x="80" y="245" class="yellow">SLIPWAY</text>
  <text x="160" y="245" class="dim">—</text>
  <text x="360" y="245" class="white">0x1300 – 0x1320</text>
  <text x="520" y="245" class="orange">● MERGING</text>

  <!-- Merge visualization -->
  <rect x="620" y="232" width="60" height="18" class="slot-slipway" rx="2"/>
  <text x="625" y="245" class="yellow">4KB ▸</text>
  <rect x="685" y="232" width="60" height="18" fill="#4a3b1a" stroke="#d4b83b" stroke-width="1" rx="2"/>
  <text x="690" y="245" class="dim">waiting</text>

  <!-- Row 4: dead -->
  <rect x="10" y="260" width="750" height="34" class="slot-dead" rx="1"/>
  <rect x="20" y="270" width="30" height="18" class="slot-dead"/>
  <text x="28" y="283" class="red bold">4</text>

  <text x="80" y="281" class="red">DEAD</text>
  <text x="160" y="281" class="dim">— (freed)</text>
  <text x="360" y="281" class="dim">0x1400 – 0x143F</text>
  <text x="520" y="281" class="red">● FRAGMENT</text>

  <rect x="10" y="296" width="750" height="1" class="bg-border"/>

  <!-- Row 5: free -->
  <rect x="10" y="298" width="750" height="34" class="slot-free" rx="1"/>
  <rect x="20" y="308" width="30" height="18" class="slot-free"/>
  <text x="28" y="321" class="dim">5</text>

  <text x="80" y="319" class="dim">— (free)</text>
  <text x="160" y="319" class="dim">—</text>
  <text x="360" y="319" class="dim">0x1500 – 0x15FF</text>
  <text x="520" y="319" class="dim">● FREE</text>

  <!-- Row 6: free -->
  <rect x="10" y="334" width="750" height="34" class="slot-free" rx="1"/>
  <rect x="20" y="344" width="30" height="18" class="slot-free"/>
  <text x="28" y="357" class="dim">6</text>
  <text x="80" y="355" class="dim">— (free)</text>
  <text x="160" y="355" class="dim">—</text>
  <text x="360" y="355" class="dim">0x1600 – 0x16FF</text>
  <text x="520" y="355" class="dim">● FREE</text>

  <!-- Row 7: normal -->
  <rect x="10" y="370" width="750" height="34" class="slot-normal" rx="1"/>
  <rect x="20" y="380" width="30" height="18" class="slot-normal"/>
  <text x="28" y="393" class="blue bold">7</text>
  <text x="80" y="391" class="blue">NORMAL</text>
  <text x="160" y="391" class="white">batch-4 / step 2</text>
  <text x="360" y="391" class="white">0x1700 – 0x17FF</text>
  <text x="520" y="391" class="green">● DONE</text>

  <!-- Row 8: dead -->
  <rect x="10" y="406" width="750" height="34" class="slot-dead" rx="1"/>
  <rect x="20" y="416" width="30" height="18" class="slot-dead"/>
  <text x="28" y="429" class="red bold">8</text>
  <text x="80" y="427" class="red">DEAD</text>
  <text x="160" y="427" class="dim">— (freed)</text>
  <text x="360" y="427" class="dim">0x1800 – 0x189F</text>
  <text x="520" y="427" class="red">● FRAGMENT</text>

  <!-- Tetris-like visual: slot occupancy blocks (right side of grid) -->
  <rect x="640" y="112" width="120" height="330" rx="3" class="bg-dim" stroke="#3e3e42" stroke-width="1"/>
  <text x="650" y="130" class="dim">Occupancy</text>
  <text x="650" y="148" class="bold white">31 / 32 slots</text>

  <!-- Bar visualization of all slots -->
  <rect x="650" y="162" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="670" y="162" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="690" y="162" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="710" y="162" width="14" height="14" class="slot-slipway" rx="1"/>
  <rect x="730" y="162" width="14" height="14" class="slot-dead" rx="1"/>

  <rect x="650" y="182" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="670" y="182" width="14" height="14" class="slot-active" rx="1"/>
  <rect x="690" y="182" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="710" y="182" width="14" height="14" class="slot-slipway" rx="1"/>
  <rect x="730" y="182" width="14" height="14" class="slot-free" rx="1"/>

  <rect x="650" y="202" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="670" y="202" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="690" y="202" width="14" height="14" class="slot-dead" rx="1"/>
  <rect x="710" y="202" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="730" y="202" width="14" height="14" class="slot-normal" rx="1"/>

  <rect x="650" y="222" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="670" y="222" width="14" height="14" class="slot-slipway" rx="1"/>
  <rect x="690" y="222" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="710" y="222" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="730" y="222" width="14" height="14" class="slot-slipway" rx="1"/>

  <rect x="650" y="242" width="14" height="14" class="slot-dead" rx="1"/>
  <rect x="670" y="242" width="14" height="14" class="slot-free" rx="1"/>
  <rect x="690" y="242" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="710" y="242" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="730" y="242" width="14" height="14" class="slot-normal" rx="1"/>

  <rect x="650" y="262" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="670" y="262" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="690" y="262" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="710" y="262" width="14" height="14" class="slot-dead" rx="1"/>
  <rect x="730" y="262" width="14" height="14" class="slot-slipway" rx="1"/>

  <rect x="650" y="282" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="670" y="282" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="690" y="282" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="710" y="282" width="14" height="14" class="slot-normal" rx="1"/>
  <rect x="730" y="282" width="14" height="14" class="slot-slipway" rx="1"/>

  <!-- Legend -->
  <rect x="650" y="310" width="100" height="80" rx="3" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <rect x="655" y="318" width="10" height="10" class="slot-active" rx="1"/>
  <text x="670" y="327" class="green">Active</text>
  <rect x="655" y="334" width="10" height="10" class="slot-normal" rx="1"/>
  <text x="670" y="343" class="blue">Normal</text>
  <rect x="655" y="350" width="10" height="10" class="slot-slipway" rx="1"/>
  <text x="670" y="359" class="yellow">Slipway</text>
  <rect x="655" y="366" width="10" height="10" class="slot-dead" rx="1"/>
  <text x="670" y="375" class="red">Dead</text>
  <rect x="655" y="382" width="10" height="10" class="slot-free" rx="1"/>
  <text x="670" y="391" class="dim">Free</text>

  <!-- Fragmentation stats -->
  <rect x="650" y="402" width="100" height="36" rx="3" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="655" y="418" class="dim">Fragmentation:</text>
  <text x="655" y="433" class="white bold">12.4%</text>

  <!-- Vertical divider -->
  <rect x="770" y="44" width="2" height="549" class="bg-border"/>

  <!-- RIGHT PANEL -->
  <rect x="772" y="46" width="328" height="24" class="bg-header"/>
  <text x="782" y="63" class="bold white">Animation Timeline</text>

  <rect x="772" y="70" width="328" height="1" class="bg-border"/>

  <!-- Timeline events -->
  <text x="785" y="94" class="dim bold">T +0.00s</text>
  <text x="870" y="94" class="white">slot 0 allocated</text>
  <text x="1000" y="94" class="green">batch-7</text>

  <text x="785" y="114" class="dim bold">T +0.12s</text>
  <text x="870" y="114" class="white">slot 2 → SLIPWAY</text>
  <text x="1000" y="114" class="yellow">evicting</text>

  <text x="785" y="134" class="dim">T +0.24s</text>
  <text x="870" y="134" class="white">slot 3 merging with 4KB</text>

  <text x="785" y="154" class="dim">T +0.31s</text>
  <text x="870" y="154" class="white">slot 4 → DEAD (fragment)</text>

  <text x="785" y="174" class="dim">T +0.45s</text>
  <text x="870" y="174" class="white">slot 6 freed</text>

  <text x="785" y="194" class="dim">T +0.58s</text>
  <text x="870" y="194" class="white">compaction started</text>

  <text x="785" y="214" class="green bold">◀ NOW</text>
  <text x="870" y="214" class="white">slot 0 incoming data</text>
  <rect x="920" y="206" width="40" height="14" class="slot-active" rx="1"/>

  <rect x="772" y="230" width="328" height="1" class="bg-border"/>

  <!-- Pool summary -->
  <text x="782" y="254" class="bold white">Pool Summary</text>

  <text x="782" y="278" class="dim">Total slots</text>
  <text x="920" y="278" class="white">32</text>

  <text x="782" y="298" class="green">Normal</text>
  <text x="920" y="298" class="white">20</text>

  <text x="782" y="318" class="yellow">Slipway</text>
  <text x="920" y="318" class="white">6</text>

  <text x="782" y="338" class="red">Dead</text>
  <text x="920" y="338" class="white">5</text>

  <text x="782" y="358" class="dim">Free</text>
  <text x="920" y="358" class="white">1</text>

  <rect x="772" y="374" width="328" height="1" class="bg-border"/>

  <!-- Compaction info -->
  <text x="782" y="398" class="bold white">Compaction</text>

  <text x="782" y="420" class="dim">Last run</text>
  <text x="920" y="420" class="white">T +0.58s</text>

  <text x="782" y="440" class="dim">Recovered</text>
  <text x="920" y="440" class="white">3 slots (48 KB)</text>

  <text x="782" y="460" class="dim">Fragments</text>
  <text x="920" y="460" class="white">4</text>

  <!-- Command bar -->
  <rect x="0" y="593" width="1100" height="27" class="bg-cmd"/>
  <rect x="0" y="591" width="1100" height="2" class="bg-border"/>
  <text x="15" y="611" class="green bold">&gt;</text>
  <text x="30" y="611" class="white">:slots-anim</text>
  <text x="130" y="611" class="dim">Space: pause  |  ← →: speed  |  r: refresh  |  :slots (static view)</text>
</svg>