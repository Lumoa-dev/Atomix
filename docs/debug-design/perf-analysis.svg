<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Consolas, 'Courier New', monospace" font-size="13">
  <defs>
    <style>
      text { fill: #c0c0c0; }
      .green { fill: #4ec94e; } .red { fill: #e05555; } .yellow { fill: #d4b83b; }
      .dim { fill: #6a6a6a; } .white { fill: #e8e8e8; } .cyan { fill: #4ec9b0; }
      .orange { fill: #ce9178; } .blue { fill: #569cd6; } .purple { fill: #c586c0; }
      .bold { font-weight: bold; }
      .bg { fill: #1e1e1e; } .bg-panel { fill: #252526; } .bg-header { fill: #2d2d30; }
      .bg-cmd { fill: #1a1a1a; } .bg-selected { fill: #264f78; } .bg-border { fill: #3e3e42; }
      .bg-dim { fill: #333333; } .bg-bar { fill: #569cd6; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" class="bg"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="24" class="bg-header"/>
  <text x="12" y="16" class="dim">atomix debug — demo.atx</text>

  <!-- Breadcrumb -->
  <rect x="0" y="24" width="1100" height="22" class="bg-header"/>
  <text x="12" y="39" class="dim">Home ▸</text>
  <text x="70" y="39" class="cyan bold">:perf</text>
  <text x="140" y="39" class="dim">│ Performance Analysis</text>

  <rect x="0" y="46" width="1100" height="1" class="bg-border"/>

  <!-- LEFT PANEL (760px) -->

  <!-- Instruction Distribution -->
  <text x="15" y="72" class="bold white">Instruction Distribution (by opcode category)</text>
  <rect x="15" y="80" width="740" height="100" class="bg-panel" rx="3" stroke="#3e3e42" stroke-width="1"/>

  <!-- Bar chart: ARITH -->
  <text x="25" y="104" class="blue bold">ARITH</text>
  <rect x="80" y="90" width="280" height="12" class="bg-dim"/>
  <rect x="80" y="90" width="196" height="12" class="bg-bar" opacity="0.8"/>
  <text x="370" y="102" class="white">4,280</text>
  <text x="420" y="102" class="dim">(35.2%)</text>

  <!-- MEM -->
  <text x="25" y="124" class="purple bold">MEM</text>
  <rect x="80" y="110" width="280" height="12" class="bg-dim"/>
  <rect x="80" y="110" width="140" height="12" fill="#c586c0" opacity="0.8"/>
  <text x="370" y="122" class="white">3,040</text>
  <text x="420" y="122" class="dim">(25.0%)</text>

  <!-- CTRL -->
  <text x="25" y="144" class="orange bold">CTRL</text>
  <rect x="80" y="130" width="280" height="12" class="bg-dim"/>
  <rect x="80" y="130" width="88" height="12" fill="#ce9178" opacity="0.8"/>
  <text x="370" y="142" class="white">1,920</text>
  <text x="420" y="142" class="dim">(15.8%)</text>

  <!-- SYSTEM -->
  <text x="25" y="164" class="red bold">SYSTEM</text>
  <rect x="80" y="150" width="280" height="12" class="bg-dim"/>
  <rect x="80" y="150" width="48" height="12" fill="#e05555" opacity="0.8"/>
  <text x="370" y="162" class="white">1,040</text>
  <text x="420" y="162" class="dim">(8.6%)</text>

  <!-- Other -->
  <text x="25" y="184" class="dim bold">OTHER</text>
  <rect x="80" y="170" width="280" height="12" class="bg-dim"/>
  <rect x="80" y="170" width="48" height="12" class="bg-bar" opacity="0.4"/>
  <text x="370" y="182" class="white">1,880</text>
  <text x="420" y="182" class="dim">(15.4%)</text>

  <!-- Total -->
  <text x="540" y="104" class="dim bold">Total:</text>
  <text x="590" y="104" class="white bold">12,160</text>
  <text x="660" y="104" class="dim">instructions</text>

  <!-- Hot Path -->
  <text x="15" y="210" class="bold white">Hot Path — Top 5 Most Executed PCs</text>
  <rect x="15" y="218" width="740" height="120" class="bg-panel" rx="3" stroke="#3e3e42" stroke-width="1"/>

  <text x="25" y="240" class="dim">#</text>
  <text x="45" y="240" class="dim">PC</text>
  <text x="120" y="240" class="dim">Count</text>
  <text x="200" y="240" class="dim">%</text>
  <text x="260" y="240" class="dim">Source Location</text>

  <!-- #1 -->
  <text x="25" y="262" class="white bold">1</text>
  <text x="45" y="262" class="cyan">0x00A4</text>
  <text x="120" y="262" class="white">1,240</text>
  <text x="200" y="262" class="dim">10.2%</text>
  <text x="260" y="262" class="dim">validate.atx:87</text>
  <text x="400" y="262" class="orange">— check_format()</text>

  <!-- #2 -->
  <text x="25" y="282" class="white bold">2</text>
  <text x="45" y="282" class="cyan">0x0088</text>
  <text x="120" y="282" class="white">980</text>
  <text x="200" y="282" class="dim">8.1%</text>
  <text x="260" y="282" class="dim">validate.atx:42</text>
  <text x="400" y="282" class="orange">— parse_header()</text>

  <!-- #3 -->
  <text x="25" y="302" class="white bold">3</text>
  <text x="45" y="302" class="cyan">0x011C</text>
  <text x="120" y="302" class="white">720</text>
  <text x="200" y="302" class="dim">5.9%</text>
  <text x="260" y="302" class="dim">transform.atx:34</text>
  <text x="400" y="302" class="orange">— apply_mapping()</text>

  <!-- #4 -->
  <text x="25" y="322" class="white bold">4</text>
  <text x="45" y="322" class="cyan">0x00F0</text>
  <text x="120" y="322" class="white">655</text>
  <text x="200" y="322" class="dim">5.4%</text>
  <text x="260" y="322" class="dim">validate.atx:103</text>
  <text x="400" y="322" class="orange">— validate_row()</text>

  <!-- #5 -->
  <text x="25" y="342" class="white bold">5</text>
  <text x="45" y="342" class="cyan">0x0150</text>
  <text x="120" y="342" class="white">512</text>
  <text x="200" y="342" class="dim">4.2%</text>
  <text x="260" y="342" class="dim">fetch.atx:22</text>
  <text x="400" y="342" class="orange">— read_chunk()</text>

  <!-- Divider -->
  <rect x="0" y="348" width="760" height="1" class="bg-border"/>

  <!-- Step Timing -->
  <text x="15" y="372" class="bold white">Step Timing Breakdown</text>
  <rect x="15" y="380" width="740" height="140" class="bg-panel" rx="3" stroke="#3e3e42" stroke-width="1"/>

  <text x="25" y="400" class="dim">Step</text>
  <text x="200" y="400" class="dim">Duration</text>
  <text x="320" y="400" class="dim">% of total</text>
  <text x="460" y="400" class="dim">Instructions</text>

  <!-- Step 3 (longest) -->
  <rect x="20" y="406" width="730" height="20" rx="2" class="bg-selected"/>
  <text x="25" y="420" class="red bold">STEP 3</text>
  <text x="200" y="420" class="white">5.2 ms</text>
  <rect x="320" y="414" width="100" height="12" class="bg-dim"/>
  <rect x="320" y="414" width="100" height="12" fill="#ce9178" opacity="0.8"/>
  <text x="425" y="420" class="dim">34.7%</text>
  <text x="460" y="420" class="white">5,440</text>
  <text x="560" y="420" class="orange">transform(data)</text>

  <!-- Step 2 -->
  <rect x="20" y="428" width="730" height="20" rx="2"/>
  <text x="25" y="442" class="white bold">STEP 2</text>
  <text x="200" y="442" class="white">4.8 ms</text>
  <rect x="320" y="436" width="100" height="12" class="bg-dim"/>
  <rect x="320" y="436" width="86" height="12" class="bg-bar" opacity="0.8"/>
  <text x="425" y="442" class="dim">32.0%</text>
  <text x="460" y="442" class="white">4,280</text>
  <text x="560" y="442" class="cyan">validate(RAW)</text>

  <!-- Step 1 -->
  <rect x="20" y="450" width="730" height="20" rx="2"/>
  <text x="25" y="464" class="white bold">STEP 1</text>
  <text x="200" y="464" class="white">2.1 ms</text>
  <rect x="320" y="458" width="100" height="12" class="bg-dim"/>
  <rect x="320" y="458" width="40" height="12" class="green" opacity="0.6"/>
  <text x="425" y="464" class="dim">14.0%</text>
  <text x="460" y="464" class="white">1,920</text>
  <text x="560" y="464" class="green">fetch_data()</text>

  <!-- Step 4 -->
  <rect x="20" y="472" width="730" height="20" rx="2"/>
  <text x="25" y="486" class="dim bold">STEP 4</text>
  <text x="200" y="486" class="dim">0.8 ms</text>
  <rect x="320" y="480" width="100" height="12" class="bg-dim"/>
  <rect x="320" y="480" width="14" height="12" class="dim" opacity="0.5"/>
  <text x="425" y="486" class="dim">5.3%</text>
  <text x="460" y="486" class="dim">520</text>
  <text x="560" y="486" class="dim">send_report()</text>

  <!-- Total -->
  <text x="25" y="510" class="dim bold">Total</text>
  <text x="200" y="510" class="white bold">15.0 ms</text>
  <text x="425" y="510" class="dim">100%</text>
  <text x="460" y="510" class="white bold">12,160</text>

  <!-- Vertical divider -->
  <rect x="760" y="46" width="2" height="547" class="bg-border"/>

  <!-- RIGHT PANEL -->
  <rect x="762" y="48" width="338" height="24" class="bg-header"/>
  <text x="772" y="65" class="bold white">Memory Profile</text>

  <rect x="762" y="72" width="338" height="1" class="bg-border"/>

  <text x="772" y="96" class="dim">Allocations</text>
  <text x="920" y="96" class="white">1,248</text>

  <text x="772" y="116" class="dim">Deallocations</text>
  <text x="920" y="116" class="white">1,240</text>

  <text x="772" y="136" class="dim">Peak usage</text>
  <text x="920" y="136" class="white">1.2 MB</text>

  <text x="772" y="156" class="dim">Current</text>
  <text x="920" y="156" class="white">128 KB</text>

  <text x="772" y="176" class="dim">Leaked</text>
  <text x="920" y="176" class="green">0 B</text>

  <rect x="762" y="192" width="338" height="1" class="bg-border"/>

  <text x="772" y="216" class="bold white">Memory by Zone</text>

  <text x="772" y="240" class="dim">boot</text>
  <text x="840" y="240" class="white">48 KB</text>
  <rect x="900" y="234" width="180" height="10" class="bg-dim"/>
  <rect x="900" y="234" width="36" height="10" fill="#4ec94e" opacity="0.6"/>

  <text x="772" y="260" class="dim">validate</text>
  <text x="840" y="260" class="white">256 KB</text>
  <rect x="900" y="254" width="180" height="10" class="bg-dim"/>
  <rect x="900" y="254" width="144" height="10" fill="#569cd6" opacity="0.6"/>

  <text x="772" y="280" class="dim">transform</text>
  <text x="840" y="280" class="white">640 KB</text>
  <rect x="900" y="274" width="180" height="10" class="bg-dim"/>
  <rect x="900" y="274" width="180" height="10" fill="#c586c0" opacity="0.6"/>

  <text x="772" y="300" class="dim">output</text>
  <text x="840" y="300" class="white">128 KB</text>
  <rect x="900" y="294" width="180" height="10" class="bg-dim"/>
  <rect x="900" y="294" width="72" height="10" fill="#ce9178" opacity="0.6"/>

  <rect x="762" y="316" width="338" height="1" class="bg-border"/>

  <!-- Cache / misc stats -->
  <text x="772" y="340" class="bold white">Runtime Stats</text>

  <text x="772" y="364" class="dim">Cache hits</text>
  <text x="920" y="364" class="white">4,280</text>
  <text x="960" y="364" class="dim">(92%)</text>

  <text x="772" y="384" class="dim">Cache misses</text>
  <text x="920" y="384" class="white">372</text>
  <text x="960" y="384" class="dim">(8%)</text>

  <text x="772" y="404" class="dim">Context switches</text>
  <text x="920" y="404" class="white">12</text>

  <text x="772" y="424" class="dim">ECALL count</text>
  <text x="920" y="424" class="white">48</text>

  <text x="772" y="444" class="dim">Avg IPC</text>
  <text x="920" y="444" class="white">2.4</text>

  <!-- Command bar -->
  <rect x="0" y="590" width="1100" height="30" class="bg-cmd"/>
  <rect x="0" y="588" width="1100" height="2" class="bg-border"/>
  <text x="12" y="610" class="green bold">&gt;</text>
  <text x="26" y="610" class="white">:perf</text>
  <text x="80" y="610" class="dim">│</text>
  <text x="95" y="610" class="dim">exit  :src  :df  :disasm  :regs</text>
</svg>