<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Consolas, 'Courier New', monospace" font-size="11">
  <defs>
    <style>
      text { fill: #c0c0c0; }
      .green { fill: #4ec94e; } .red { fill: #e05555; } .yellow { fill: #d4b83b; }
      .dim { fill: #6a6a6a; } .white { fill: #e8e8e8; } .cyan { fill: #4ec9b0; }
      .blue { fill: #569cd6; } .bold { font-weight: bold; }
      .bg { fill: #1e1e1e; } .bg-header { fill: #2d2d30; } .bg-cmd { fill: #1a1a1a; }
      .bg-border { fill: #3e3e42; } .bg-card { fill: #252526; rx: 4; }
    </style>
  </defs>

  <rect width="1100" height="620" class="bg"/>
  <rect x="0" y="0" width="1100" height="22" class="bg-header"/>
  <text x="12" y="15" class="dim">atomix debug — prod-runner</text>

  <rect x="0" y="22" width="1100" height="22" class="bg-header"/>
  <text x="10" y="37" class="blue">Dashboard</text>
  <text x="85" y="37" class="dim">▸</text>
  <text x="100" y="37" class="cyan bold">Memory Slots</text>
  <text x="200" y="37" class="dim">│ 24/32 used  |  frag 12.4%  |  r:refresh</text>

  <rect x="0" y="44" width="770" height="536" fill="#1e1e1e"/>

  <!-- Slot header -->
  <rect x="0" y="44" width="770" height="18" class="bg-header"/>
  <text x="10" y="56" class="bold white">#</text>
  <text x="30" y="56" class="bold white">Task</text>
  <text x="180" y="56" class="bold white">Size</text>
  <text x="260" y="56" class="bold white">Used</text>
  <text x="340" y="56" class="bold white">Usage</text>
  <text x="450" y="56" class="bold white">Status</text>
  <text x="580" y="56" class="bold white">Zone</text>

  <!-- Slot 0 -->
  <text x="15" y="82" class="dim">0</text>
  <text x="30" y="82" class="white">batch-process</text>
  <text x="180" y="82" class="dim">16.0 MB</text>
  <text x="260" y="82" class="dim">12.4 MB</text>
  <text x="340" y="82" class="dim">████████░░ 78%</text>
  <text x="450" y="82" class="green">SAFE</text>
  <text x="580" y="82" class="dim">NORMAL</text>

  <!-- Slot 1 -->
  <text x="15" y="102" class="dim">1</text>
  <text x="30" y="102" class="white">validate-orders</text>
  <text x="180" y="102" class="dim">16.0 MB</text>
  <text x="260" y="102" class="dim">14.2 MB</text>
  <text x="340" y="102" class="yellow">██████████░ 89%</text>
  <text x="450" y="102" class="yellow">WARNING</text>
  <text x="580" y="102" class="dim">NORMAL</text>

  <!-- Slot 2 (selected) -->
  <rect x="0" y="110" width="770" height="20" fill="#264f78"/>
  <text x="15" y="126" class="green bold">2</text>
  <text x="30" y="126" class="white bold">aggregate-data</text>
  <text x="180" y="126" class="white bold">16.0 MB</text>
  <text x="260" y="126" class="white bold">15.8 MB</text>
  <text x="340" y="126" class="red bold">███████████ 99%</text>
  <text x="450" y="126" class="red bold">RESERVED</text>
  <text x="580" y="126" class="dim">NORMAL</text>

  <!-- Slot 3-20 (normal) -->
  <text x="15" y="148" class="dim">3-20</text>
  <text x="50" y="148" class="dim">(18 slots, various tasks)</text>
  <text x="260" y="148" class="dim">avg 8.2 MB</text>
  <text x="340" y="148" class="dim">████░░░░ 51%</text>
  <text x="450" y="148" class="green">SAFE</text>
  <text x="580" y="148" class="dim">NORMAL</text>

  <!-- Slipway slots -->
  <rect x="5" y="162" width="760" height="18" fill="#1a1a1a"/>
  <text x="15" y="176" class="yellow bold">Slipway (4)</text>

  <text x="15" y="198" class="dim">S0</text>
  <text x="40" y="198" class="dim">(reserve)</text>
  <text x="180" y="198" class="dim">16.0 MB</text>
  <text x="260" y="198" class="dim">0 MB</text>
  <text x="340" y="198" class="dim">░░░░░░░░░░ 0%</text>
  <text x="450" y="198" class="yellow">SLIPWAY</text>
  <text x="580" y="198" class="dim">SLIPWAY</text>

  <text x="15" y="218" class="dim">S1-S3</text>
  <text x="50" y="218" class="dim">(3 reserve slots)</text>
  <text x="260" y="218" class="dim">0 MB</text>
  <text x="340" y="218" class="dim">░░░░░░░░░░ 0%</text>
  <text x="450" y="218" class="yellow">SLIPWAY</text>
  <text x="580" y="218" class="dim">SLIPWAY</text>

  <!-- Dead zones -->
  <rect x="5" y="238" width="760" height="18" fill="#1a1a1a"/>
  <text x="15" y="252" class="dim bold">Dead (4)</text>

  <text x="15" y="274" class="dim">D0-D3</text>
  <text x="50" y="274" class="dim">(4 freed, merging...)</text>
  <text x="260" y="274" class="dim">0 MB</text>
  <text x="340" y="274" class="dim">░░░░░░░░░░ —</text>
  <text x="450" y="274" class="dim">DEAD</text>
  <text x="580" y="274" class="dim">DEAD</text>

  <rect x="10" y="300" width="750" height="1" class="bg-border"/>

  <!-- Summary -->
  <rect x="10" y="315" width="750" height="60" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="24" y="338" class="bold white">Summary</text>
  <text x="24" y="360" class="dim">NORMAL: 20 slots (62.5%)  |  SLIPWAY: 4 slots (12.5%)  |  DEAD: 4 slots (12.5%)  |  Frag: 12.4%</text>
  <text x="24" y="380" class="dim">Total Pool: 512 MB  |  Allocated: 384 MB (75%)  |  Wasted (frag): 47 MB (9.2%)</text>

  <!-- Right panel -->
  <rect x="770" y="44" width="2" height="536" class="bg-border"/>
  <rect x="780" y="48" width="310" height="22" class="bg-header"/>
  <text x="790" y="63" class="bold white">Slot Detail (slot 2)</text>

  <rect x="780" y="76" width="310" height="100" fill="#264f78" rx="4"/>
  <text x="795" y="96" class="red bold">Slot 2 — RESERVED</text>
  <text x="795" y="116" class="dim">Task:</text><text x="840" y="116" class="white">aggregate-data (e4d7)</text>
  <text x="795" y="134" class="dim">Used:</text><text x="840" y="134" class="red">15.8 / 16.0 MB (99%)</text>
  <text x="795" y="152" class="dim">Watermark:</text><text x="880" y="152" class="red">15.9 MB</text>
  <text x="795" y="170" class="dim">Status:</text><text x="855" y="170" class="red">RESERVED — OOM imminent</text>

  <rect x="0" y="593" width="1100" height="27" class="bg-cmd"/>
  <rect x="0" y="591" width="1100" height="2" class="bg-border"/>
  <text x="15" y="611" class="green bold">&gt;</text>
  <text x="30" y="611" class="white">r</text>
  <text x="55" y="611" class="dim">refresh  |  ↑↓ select slot  |  exit:Dashboard</text>

</svg>