<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Consolas, 'Courier New', monospace" font-size="11">
  <defs>
    <style>
      text { fill: #c0c0c0; }
      .green { fill: #4ec94e; } .red { fill: #e05555; } .yellow { fill: #d4b83b; }
      .dim { fill: #6a6a6a; } .white { fill: #e8e8e8; } .cyan { fill: #4ec9b0; }
      .blue { fill: #569cd6; } .bold { font-weight: bold; }
      .bg { fill: #1e1e1e; } .bg-header { fill: #2d2d30; } .bg-cmd { fill: #1a1a1a; }
      .bg-border { fill: #3e3e42; } .bg-card { fill: #252526; rx: 4; }
    </style>
  </defs>

  <rect width="1100" height="620" class="bg"/>
  <rect x="0" y="0" width="1100" height="22" class="bg-header"/>
  <text x="12" y="15" class="dim">atomix debug — prod-runner</text>

  <rect x="0" y="22" width="1100" height="22" class="bg-header"/>
  <text x="10" y="37" class="blue">Dashboard</text>
  <text x="85" y="37" class="dim">▸</text>
  <text x="100" y="37" class="cyan bold">Controller Panel</text>
  <text x="200" y="37" class="dim">│ r:refresh</text>

  <rect x="0" y="44" width="770" height="536" fill="#1e1e1e"/>

  <!-- Batch Card -->
  <rect x="10" y="54" width="240" height="100" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="24" y="74" class="bold white">Batch</text>
  <text x="24" y="100" class="white">N_batch: 4</text>
  <text x="24" y="120" class="dim">Hard Ceiling: 12</text>
  <text x="24" y="138" class="dim">Soft Ceiling: 8</text>

  <!-- Backlog Card -->
  <rect x="265" y="54" width="240" height="100" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="279" y="74" class="bold white">Backlog</text>
  <text x="279" y="100" class="yellow bold">34 tasks</text>
  <text x="279" y="120" class="yellow">⚠ HIGH BACKLOG</text>
  <text x="279" y="138" class="dim">Cold Start: NO</text>

  <!-- OOM Card -->
  <rect x="520" y="54" width="240" height="100" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="534" y="74" class="bold white">OOM Feedback</text>
  <text x="534" y="100" class="red">α_mem: 0.375</text>
  <text x="534" y="120" class="red">OOM Count: 3</text>
  <text x="534" y="138" class="red">State: INCREASE</text>

  <!-- Factors -->
  <rect x="10" y="165" width="750" height="120" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="24" y="185" class="bold white">Sigmoid Factors</text>
  <text x="24" y="212" class="dim">β (backlog):</text><text x="130" y="212" class="white">0.82</text>
  <text x="230" y="212" class="dim">λ (speed):</text><text x="320" y="212" class="white">0.65</text>
  <text x="420" y="212" class="dim">σ (volume):</text><text x="520" y="212" class="white">0.71</text>
  <text x="24" y="234" class="dim">γ (variance):</text><text x="130" y="234" class="white">0.23</text>
  <text x="230" y="234" class="dim">θ (merge):</text><text x="320" y="234" class="white">0.58</text>
  <text x="24" y="262" class="dim">Weights:</text><text x="100" y="262" class="white">wβ=1.0 wλ=0.8 wσ=0.6 wγ=0.4 wθ=0.5</text>

  <!-- Slots summary -->
  <rect x="10" y="296" width="750" height="80" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="24" y="316" class="bold white">Memory Slots</text>
  <text x="24" y="342" class="white">32 total</text>
  <text x="120" y="342" class="blue">● 24 used</text>
  <text x="220" y="342" class="yellow">● 4 slipway</text>
  <text x="350" y="342" class="dim">● 4 dead</text>
  <text x="480" y="342" class="dim">Slot Size: 16.0 MB</text>
  <text x="24" y="364" class="dim">Slipway Multiplier: 1.5x  |  Fragmentation: 12.4%</text>

  <!-- Regression -->
  <rect x="10" y="386" width="750" height="70" class="bg-card" stroke="#3e3e42" stroke-width="1"/>
  <text x="24" y="406" class="bold white">Regression Model</text>
  <text x="24" y="430" class="dim">α=0.0042  β=1.12  R²=0.87  |  samples: 156  |  last trained: 5m ago</text>

  <!-- Right panel -->
  <rect x="770" y="44" width="2" height="536" class="bg-border"/>
  <rect x="780" y="48" width="310" height="22" class="bg-header"/>
  <text x="790" y="63" class="bold white">Controller Detail</text>

  <text x="795" y="88" class="dim">Decision logic:</text>
  <text x="795" y="108" class="white">n = β·λ·σ / γ · N_max</text>
  <text x="795" y="128" class="white">slot_MB = base · σ · merged</text>
  <text x="795" y="148" class="dim">OOM adjust: α_mem *= 1.5</text>
  <text x="795" y="168" class="dim">Hysteresis: 5 normal epochs</text>

  <rect x="0" y="593" width="1100" height="27" class="bg-cmd"/>
  <text x="0" y="591" width="1100" height="2" class="bg-border"/>
  <text x="15" y="611" class="green bold">&gt;</text>
  <text x="30" y="611" class="white">r</text>
  <text x="55" y="611" class="dim">refresh  |  exit:Dashboard</text>

</svg>